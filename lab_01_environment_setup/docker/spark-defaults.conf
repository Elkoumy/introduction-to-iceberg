# ---------------------------------------------------------------------------
# Spark defaults for the Iceberg bootcamp (Lab 1+)
# Mounted into the container at $SPARK_HOME/conf/spark-defaults.conf, so every
# SparkSession created in Jupyter picks these up automatically.
# ---------------------------------------------------------------------------

# --- Dependencies -----------------------------------------------------------
# The Docker image pre-downloads these into the local Ivy cache at build time,
# so resolving them at session start is instant and needs no internet.
spark.jars.packages                                org.apache.iceberg:iceberg-spark-runtime-3.5_2.12:1.5.2,org.apache.iceberg:iceberg-aws-bundle:1.5.2,org.apache.hadoop:hadoop-aws:3.3.4,org.postgresql:postgresql:42.6.0
spark.jars.ivy                                     /opt/ivy2

# --- Iceberg SQL extensions -------------------------------------------------
spark.sql.extensions                               org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# --- The `hive_prod` catalog: Iceberg tables tracked by the Hive Metastore --
spark.sql.catalog.hive_prod                        org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.hive_prod.type                   hive
spark.sql.catalog.hive_prod.uri                    thrift://hive-metastore:9083
spark.sql.catalog.hive_prod.warehouse              s3a://warehouse/
spark.sql.catalog.hive_prod.io-impl                org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.hive_prod.s3.endpoint            http://minio:9000
spark.sql.catalog.hive_prod.s3.path-style-access   true
spark.sql.catalog.hive_prod.s3.access-key-id       admin
spark.sql.catalog.hive_prod.s3.secret-access-key   password
spark.sql.catalog.hive_prod.client.region          us-east-1

# Make `db.table` resolve against hive_prod without a catalog prefix
spark.sql.defaultCatalog                           hive_prod

# --- s3a:// access (Hadoop S3A, used for non-Iceberg reads/writes) ----------
spark.hadoop.fs.s3a.endpoint                       http://minio:9000
spark.hadoop.fs.s3a.access.key                     admin
spark.hadoop.fs.s3a.secret.key                     password
spark.hadoop.fs.s3a.path.style.access              true
spark.hadoop.fs.s3a.connection.ssl.enabled         false
spark.hadoop.fs.s3a.aws.credentials.provider       org.apache.hadoop.fs.s3a.SimpleAWSCredentialsProvider

# --- Quality of life ---------------------------------------------------------
spark.driver.memory                                2g
spark.sql.session.timeZone                         UTC
